<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تقييم الأداء</title>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: #1a2d4a;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }
        h1 { color: #d4a843; margin: 0 0 10px; }
        p { color: #9aaab8; margin: 5px 0; }
        .gold { color: #d4a843; }
        .btn {
            display: inline-block;
            background: #d4a843;
            color: #0f1a2e;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 15px;
        }
        .btn:hover { background: #e8c97a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⭐</div>
        <h1>نظام تقييم الأداء</h1>
        <p>مركز خدمة العملاء</p>
        <p style="font-size:14px; margin-top:10px;">
            ✅ الموقع يعمل بنجاح على GitHub Pages!
        </p>
        <a href="#" class="btn">🚀 تسجيل الدخول</a>
        <p style="font-size:12px; color:#6a7a88; margin-top:20px;">
            سيتم ربط النظام بـ Google Apps Script قريباً
        </p>
    </div>
</body>
</html>
