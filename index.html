<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام تقييم جودة الأداء</title>
  
  <!-- ============================================================
       التصميم (تم دمجه مباشرة ليعمل على GitHub Pages)
       ============================================================ -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');

    :root {
      --primary-navy: #0f1a2e;
      --primary-navy-light: #1a2d4a;
      --gold: #d4a843;
      --gold-light: #e8c97a;
      --gold-dark: #b8922f;
      --bg-body: #f0f2f5;
      --bg-card: #ffffff;
      --bg-sidebar: #0f1a2e;
      --text-primary: #1a2d4a;
      --text-secondary: #5a6b7c;
      --text-white: #ffffff;
      --border-color: #e2e6ee;
      --shadow-sm: 0 2px 8px rgba(15, 26, 46, 0.06);
      --shadow-md: 0 4px 20px rgba(15, 26, 46, 0.10);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --transition: all 0.3s ease;
      --success: #2e7d5b;
      --success-bg: #e8f5ee;
      --danger: #c0392b;
      --danger-bg: #fdedea;
      --warning: #d9822b;
      --warning-bg: #fdf0e4;
    }

    [data-theme="dark"] {
      --bg-body: #0a1120;
      --bg-card: #162135;
      --bg-sidebar: #080f1a;
      --text-primary: #e8ecf1;
      --text-secondary: #9aaab8;
      --text-white: #ffffff;
      --border-color: #2a3d5a;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      height: 100%;
      font-family: 'Tajawal', sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      direction: rtl;
      transition: var(--transition);
    }

    ::selection { background: var(--gold); color: var(--primary-navy); }

    /* ===== تخطيط الصفحة ===== */
    .app-wrapper { display: flex; min-height: 100vh; }

    /* ===== الشريط الجانبي ===== */
    .sidebar {
      width: 270px;
      flex-shrink: 0;
      background: var(--bg-sidebar);
      color: var(--text-white);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      z-index: 100;
      transition: var(--transition);
      overflow-y: auto;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px 28px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 20px;
    }

    .sidebar-brand .logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: var(--primary-navy);
      flex-shrink: 0;
    }

    .sidebar-brand .brand-title {
      font-size: 16px;
      font-weight: 800;
    }
    .sidebar-brand .brand-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      transition: var(--transition);
      margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .nav-item.active {
      background: linear-gradient(90deg, rgba(212,168,67,0.15), rgba(212,168,67,0.05));
      color: var(--gold-light);
    }
    .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: var(--primary-navy);
      flex-shrink: 0;
    }
    .user-info .name { font-size: 14px; font-weight: 700; color: #fff; }
    .user-info .role { font-size: 11px; color: rgba(255,255,255,0.4); }

    /* ===== القسم الرئيسي ===== */
    .main-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 50;
      min-height: 70px;
    }
    .topbar h1 { font-size: 18px; font-weight: 800; margin: 0; }
    .topbar h1 span { color: var(--gold); }

    .topbar-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--bg-body);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }
    .topbar-btn:hover { border-color: var(--gold); background: var(--gold); color: #fff; }

    .content { padding: 28px 32px; flex: 1; }

    /* ===== البطاقات ===== */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      transition: var(--transition);
    }
    .card + .card { margin-top: 20px; }
    .card-title { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }

    /* ===== الأزرار ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--primary-navy); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,168,67,0.3); }
    .btn-block { width: 100%; }

    /* ===== النماذج ===== */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .form-control {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-color);
      background: var(--bg-body);
      color: var(--text-primary);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      transition: var(--transition);
    }
    .form-control:focus { outline: none; border-color: var(--gold); }

    /* ===== صفحة تسجيل الدخول ===== */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0a1120 0%, #1a2d4a 50%, #0f1a2e 100%);
      padding: 20px;
    }
    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-brand { text-align: center; margin-bottom: 32px; }
    .login-brand .logo-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: var(--primary-navy);
      box-shadow: 0 0 0 6px rgba(212,168,67,0.15);
    }
    .login-brand h2 { font-size: 20px; font-weight: 800; margin: 0; }
    .login-brand p { font-size: 13px; color: var(--text-secondary); margin: 4px 0 0; }
    .login-error {
      background: var(--danger-bg);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== استجابة للجوال ===== */
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
    }

    @media (max-width: 992px) {
      .sidebar {
        position: fixed;
        right: -300px;
        top: 0;
        bottom: 0;
        width: 280px;
        z-index: 101;
        transition: right 0.3s ease;
      }
      .sidebar.open { right: 0; }
      .menu-toggle { display: block; }
      .content { padding: 16px; }
      .topbar { padding: 12px 16px; }
      .topbar h1 { font-size: 15px; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       صفحة تسجيل الدخول
       ============================================================ -->
  <div id="login-screen" class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo-circle">⭐</div>
        <h2>نظام تقييم جودة الأداء</h2>
        <p>مركز خدمة العملاء</p>
      </div>

      <div id="login-error" class="login-error"></div>

      <div class="form-group">
        <label class="form-label">👤 اسم المستخدم</label>
        <input type="text" id="login-username" class="form-control" placeholder="أدخل اسم المستخدم">
      </div>

      <div class="form-group">
        <label class="form-label">🔒 كلمة السر</label>
        <input type="password" id="login-password" class="form-control" placeholder="أدخل كلمة السر">
      </div>

      <button id="login-btn" class="btn btn-primary btn-block" onclick="handleLogin()">
        <span id="login-btn-text">🚀 تسجيل الدخول</span>
      </button>
    </div>
  </div>

  <!-- ============================================================
       شاشة تغيير كلمة السر الإجبارية
       ============================================================ -->
  <div id="force-change-screen" class="login-page" style="display:none;">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo-circle">🔑</div>
        <h2>تغيير كلمة السر مطلوب</h2>
        <p>لأسباب أمنية، يجب تعيين كلمة سر جديدة</p>
      </div>

      <div id="force-change-error" class="login-error"></div>

      <div class="form-group">
        <label class="form-label">كلمة السر الحالية</label>
        <input type="password" id="fc-old-password" class="form-control">
      </div>

      <div class="form-group">
        <label class="form-label">كلمة السر الجديدة</label>
        <input type="password" id="fc-new-password" class="form-control">
      </div>

      <div class="form-group">
        <label class="form-label">تأكيد كلمة السر الجديدة</label>
        <input type="password" id="fc-confirm-password" class="form-control">
      </div>

      <button class="btn btn-primary btn-block" onclick="handleForceChangePassword()">💾 حفظ والمتابعة</button>
    </div>
  </div>

  <!-- ============================================================
       التطبيق الرئيسي
       ============================================================ -->
  <div id="app-shell" class="app-wrapper" style="display:none;">

    <!-- الشريط الجانبي -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo">⭐</div>
        <div>
          <div class="brand-title">تقييم الأداء</div>
          <div class="brand-subtitle">مركز خدمة العملاء</div>
        </div>
      </div>

      <nav id="nav-container">
        <!-- يتم إنشاء الأزرار بواسطة JavaScript -->
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="user-avatar" id="user-avatar">-</div>
          <div class="user-info">
            <div class="name" id="user-name">-</div>
            <div class="role" id="user-role">-</div>
          </div>
        </div>
        <div class="nav-item" onclick="handleLogout()" style="margin-top:8px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          تسجيل الخروج
        </div>
      </div>
    </aside>

    <!-- القسم الرئيسي -->
    <main class="main-area">

      <header class="topbar">
        <div style="display:flex; align-items:center; gap:16px;">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <h1 id="page-title">تقييم مكالمة جديدة</h1>
        </div>
        <div>
          <button class="topbar-btn" onclick="toggleTheme()" title="الوضع الليلي">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="content">
        <div id="page-new-evaluation"></div>
        <div id="page-my-reports" style="display:none;"></div>
        <div id="page-comprehensive-reports" style="display:none;"></div>
        <div id="page-agents-management" style="display:none;"></div>
        <div id="page-assignments" style="display:none;"></div>
        <div id="page-criteria-management" style="display:none;"></div>
        <div id="page-users-management" style="display:none;"></div>
        <div id="page-audit-log" style="display:none;"></div>
      </div>

    </main>
  </div>

  <!-- حاوية الرسائل -->
  <div id="toast-container" style="position:fixed; bottom:24px; left:24px; z-index:9999; display:flex; flex-direction:column; gap:10px;"></div>

  <!-- ============================================================
       JavaScript
       ============================================================ -->
  <script>
    // ============================================================
    // الحالة العامة
    // ============================================================
    var APP_STATE = {
      token: null,
      user: null,
      currentPage: null
    };

    // ============================================================
    // قائمة الصفحات
    // ============================================================
    var NAV_ITEMS = [
      { id: 'new-evaluation', label: 'تقييم مكالمة جديدة', roles: ['evaluator', 'supervisor', 'admin'],
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>' },
      { id: 'my-reports', label: 'تقاريري', roles: ['evaluator', 'supervisor', 'admin'],
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>' },
      { id: 'comprehensive-reports', label: 'التقارير الشاملة', roles: ['supervisor', 'admin'],
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>' },
      { id: 'agents-management', label: 'إدارة الموظفين', roles: ['supervisor', 'admin'],
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' },
      { id: 'assignments', label: 'توزيع الموظفين', roles: ['supervisor', 'admin'],
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>' },
      { id: 'criteria-management', label: 'إدارة المعايير', roles: ['admin'],
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>' },
      { id: 'users-management', label: 'إدارة المستخدمين', roles: ['admin'],
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' },
      { id: 'audit-log', label: 'سجل التعديلات', roles: ['admin'],
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>' }
    ];

    var PAGE_TITLES = {
      'new-evaluation': 'تقييم مكالمة جديدة',
      'my-reports': 'تقاريري',
      'comprehensive-reports': 'التقارير الشاملة',
      'agents-management': 'إدارة الموظفين',
      'assignments': 'توزيع الموظفين',
      'criteria-management': 'إدارة المعايير',
      'users-management': 'إدارة المستخدمين',
      'audit-log': 'سجل التعديلات'
    };

    // ============================================================
    // دوال API - تتصل بـ Google Apps Script
    // ============================================================

    function api(functionName, ...args) {
      return new Promise(function(resolve, reject) {
        try {
          google.script.run
            .withSuccessHandler(function(result) {
              console.log('✅ API Success - ' + functionName + ':', result);
              resolve(result);
            })
            .withFailureHandler(function(error) {
              console.error('❌ API Error - ' + functionName + ':', error);
              reject(error);
            })
            [functionName](...args);
        } catch (e) {
          console.error('❌ API Exception:', e);
          reject(e);
        }
      });
    }

    function apiAuth(functionName, ...args) {
      if (!APP_STATE || !APP_STATE.token) {
        showToast('الرجاء تسجيل الدخول مرة أخرى', 'error');
        return Promise.reject(new Error('لا يوجد رمز جلسة'));
      }
      return api(functionName, APP_STATE.token, ...args);
    }

    // ============================================================
    // دوال مساعدة
    // ============================================================

    function showToast(message, type) {
      type = type || 'success';
      var container = document.getElementById('toast-container');
      if (!container) return;
      var toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.cssText = 'background:#0f1a2e;color:#fff;padding:14px 22px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-size:13.5px;font-weight:600;border-right:4px solid ' + (type === 'success' ? '#2e7d5b' : '#c0392b') + ';';
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(function() { if (toast.parentNode) toast.remove(); }, 3500);
    }

    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/[&<>"']/g, function(m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m] || m;
      });
    }

    function roleLabel(role) {
      if (role === 'admin') return 'أدمن';
      if (role === 'supervisor') return 'مشرف';
      return 'مقيّم';
    }

    // ============================================================
    // تسجيل الدخول
    // ============================================================

    function handleLogin() {
      var username = document.getElementById('login-username');
      var password = document.getElementById('login-password');
      var errorBox = document.getElementById('login-error');
      var btnText = document.getElementById('login-btn-text');

      if (!username || !password) return;
      errorBox.style.display = 'none';
      var userVal = username.value.trim();
      var passVal = password.value;

      if (!userVal || !passVal) {
        errorBox.textContent = 'الرجاء إدخال اسم المستخدم وكلمة السر';
        errorBox.style.display = 'block';
        return;
      }

      btnText.innerHTML = '<span class="loader"></span>';

      api('login', userVal, passVal)
        .then(function(res) {
          btnText.textContent = '🚀 تسجيل الدخول';
          if (!res.success) {
            errorBox.textContent = res.message;
            errorBox.style.display = 'block';
            return;
          }
          APP_STATE.token = res.token;
          APP_STATE.user = res.user;

          try {
            sessionStorage.setItem('appToken', res.token);
            sessionStorage.setItem('appUser', JSON.stringify(res.user));
          } catch (e) {}

          if (res.user.mustChangePassword) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('force-change-screen').style.display = 'flex';
          } else {
            enterApp();
          }
        })
        .catch(function(err) {
          btnText.textContent = '🚀 تسجيل الدخول';
          errorBox.textContent = 'حدث خطأ، حاول مرة أخرى';
          errorBox.style.display = 'block';
          console.error('Login error:', err);
        });
    }

    function handleForceChangePassword() {
      var oldP = document.getElementById('fc-old-password');
      var newP = document.getElementById('fc-new-password');
      var confirmP = document.getElementById('fc-confirm-password');
      var errorBox = document.getElementById('force-change-error');

      if (!oldP || !newP || !confirmP || !errorBox) return;
      errorBox.style.display = 'none';

      var oldVal = oldP.value;
      var newVal = newP.value;
      var confirmVal = confirmP.value;

      if (!oldVal || !newVal || !confirmVal) {
        errorBox.textContent = 'الرجاء تعبئة كل الحقول';
        errorBox.style.display = 'block';
        return;
      }
      if (newVal !== confirmVal) {
        errorBox.textContent = 'كلمة السر الجديدة غير متطابقة';
        errorBox.style.display = 'block';
        return;
      }
      if (newVal.length < 4) {
        errorBox.textContent = 'كلمة السر يجب أن تكون 4 أحرف/أرقام على الأقل';
        errorBox.style.display = 'block';
        return;
      }

      apiAuth('changeMyPassword', oldVal, newVal)
        .then(function(res) {
          if (!res.success) {
            errorBox.textContent = res.message;
            errorBox.style.display = 'block';
            return;
          }
          showToast('تم تغيير كلمة السر بنجاح', 'success');
          document.getElementById('force-change-screen').style.display = 'none';
          enterApp();
        });
    }

    function handleLogout() {
      apiAuth('logout')
        .finally(function() {
          APP_STATE.token = null;
          APP_STATE.user = null;
          try { sessionStorage.removeItem('appToken'); sessionStorage.removeItem('appUser'); } catch(e) {}
          document.getElementById('app-shell').style.display = 'none';
          document.getElementById('login-screen').style.display = 'flex';
          document.getElementById('login-username').value = '';
          document.getElementById('login-password').value = '';
        });
    }

    // ============================================================
    // دخول التطبيق
    // ============================================================

    function enterApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-shell').style.display = 'flex';

      var user = APP_STATE.user;
      document.getElementById('user-name').textContent = user.fullName;
      document.getElementById('user-role').textContent = roleLabel(user.role);
      document.getElementById('user-avatar').textContent = user.fullName.charAt(0);

      renderNav();
      var firstPage = NAV_ITEMS.find(function(n) {
        return n.roles.includes(APP_STATE.user.role);
      });
      if (firstPage) navigateTo(firstPage.id);
    }

    function renderNav() {
      var container = document.getElementById('nav-container');
      container.innerHTML = '';
      NAV_ITEMS.filter(function(item) {
        return item.roles.includes(APP_STATE.user.role);
      }).forEach(function(item) {
        var div = document.createElement('div');
        div.className = 'nav-item';
        div.id = 'nav-' + item.id;
        div.innerHTML = item.icon + item.label;
        div.onclick = function() { navigateTo(item.id); };
        container.appendChild(div);
      });
    }

    function navigateTo(pageId) {
      APP_STATE.currentPage = pageId;
      document.getElementById('page-title').textContent = PAGE_TITLES[pageId] || pageId;

      NAV_ITEMS.forEach(function(item) {
        var el = document.getElementById('nav-' + item.id);
        if (el) el.classList.toggle('active', item.id === pageId);
      });

      Object.keys(PAGE_TITLES).forEach(function(id) {
        var el = document.getElementById('page-' + id);
        if (el) el.style.display = (id === pageId) ? 'block' : 'none';
      });

      loadPage(pageId);
      if (window.innerWidth <= 992) toggleSidebar(false);
    }

    function loadPage(pageId) {
      // الدوال موجودة في الملفات الأخرى (يتم تحميلها عبر Apps Script)
      var loaders = {
        'new-evaluation': function() { if (typeof loadNewEvaluationPage === 'function') loadNewEvaluationPage(); },
        'my-reports': function() { if (typeof loadMyReportsPage === 'function') loadMyReportsPage(); },
        'comprehensive-reports': function() { if (typeof loadComprehensiveReportsPage === 'function') loadComprehensiveReportsPage(); },
        'agents-management': function() { if (typeof loadAgentsManagementPage === 'function') loadAgentsManagementPage(); },
        'assignments': function() { if (typeof loadAssignmentsPage === 'function') loadAssignmentsPage(); },
        'criteria-management': function() { if (typeof loadCriteriaManagementPage === 'function') loadCriteriaManagementPage(); },
        'users-management': function() { if (typeof loadUsersManagementPage === 'function') loadUsersManagementPage(); },
        'audit-log': function() { if (typeof loadAuditLogPage === 'function') loadAuditLogPage(); }
      };
      if (loaders[pageId]) loaders[pageId]();
    }

    // ============================================================
    // دوال الوضع الليلي والقائمة الجانبية
    // ============================================================

    function toggleTheme() {
      var current = document.body.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    }

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
      } else {
        document.body.removeAttribute('data-theme');
      }
    }

    function toggleSidebar(forceState) {
      var sidebar = document.getElementById('sidebar');
      if (forceState === false) { sidebar.classList.remove('open'); return; }
      sidebar.classList.toggle('open');
    }

    // ============================================================
    // استعادة الجلسة عند تحميل الصفحة
    // ============================================================

    function restoreSession() {
      try {
        var savedToken = sessionStorage.getItem('appToken');
        var savedUser = sessionStorage.getItem('appUser');

        if (savedToken && savedUser) {
          APP_STATE.token = savedToken;
          APP_STATE.user = JSON.parse(savedUser);

          apiAuth('validateSession')
            .then(function(res) {
              if (res && res.success) {
                console.log('✅ Session restored');
                enterApp();
              } else {
                sessionStorage.removeItem('appToken');
                sessionStorage.removeItem('appUser');
              }
            })
            .catch(function() {
              sessionStorage.removeItem('appToken');
              sessionStorage.removeItem('appUser');
            });
        }
      } catch (e) {
        console.warn('Could not restore session:', e);
      }
    }

    // ============================================================
    // أحداث DOM
    // ============================================================

    document.addEventListener('DOMContentLoaded', function() {
      var loginPassword = document.getElementById('login-password');
      if (loginPassword) {
        loginPassword.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') handleLogin();
        });
      }
      var loginUsername = document.getElementById('login-username');
      if (loginUsername) {
        loginUsername.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') handleLogin();
        });
      }

      restoreSession();

      // إغلاق القائمة عند النقر خارجها
      document.addEventListener('click', function(e) {
        if (window.innerWidth <= 992) {
          var sidebar = document.getElementById('sidebar');
          var toggleBtn = document.querySelector('.menu-toggle');
          if (sidebar && toggleBtn) {
            if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
              sidebar.classList.remove('open');
            }
          }
        }
      });
    });
  </script>

</body>
</html>
