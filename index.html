<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام تقييم جودة الأداء</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');

    :root {
      --primary-navy: #0f1a2e;
      --primary-navy-light: #1a2d4a;
      --gold: #d4a843;
      --gold-light: #e8c97a;
      --gold-dark: #b8922f;
      --bg-body: #f0f2f5;
      --bg-card: #ffffff;
      --bg-sidebar: #0f1a2e;
      --text-primary: #1a2d4a;
      --text-secondary: #5a6b7c;
      --text-white: #ffffff;
      --border-color: #e2e6ee;
      --shadow-sm: 0 2px 8px rgba(15, 26, 46, 0.06);
      --shadow-md: 0 4px 20px rgba(15, 26, 46, 0.10);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --transition: all 0.3s ease;
      --success: #2e7d5b;
      --success-bg: #e8f5ee;
      --danger: #c0392b;
      --danger-bg: #fdedea;
      --warning: #d9822b;
      --warning-bg: #fdf0e4;
    }

    [data-theme="dark"] {
      --bg-body: #0a1120;
      --bg-card: #162135;
      --bg-sidebar: #080f1a;
      --text-primary: #e8ecf1;
      --text-secondary: #9aaab8;
      --text-white: #ffffff;
      --border-color: #2a3d5a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      height: 100%;
      font-family: 'Tajawal', sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      direction: rtl;
      transition: var(--transition);
    }

    /* ===== تسجيل الدخول ===== */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0a1120 0%, #1a2d4a 50%, #0f1a2e 100%);
      padding: 20px;
    }
    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-brand { text-align: center; margin-bottom: 32px; }
    .login-brand .logo-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--primary-navy);
      box-shadow: 0 0 0 6px rgba(212,168,67,0.15);
    }
    .login-brand h2 { font-size: 20px; font-weight: 800; margin: 0; }
    .login-brand p { font-size: 13px; color: var(--text-secondary); margin: 4px 0 0; }
    
    .login-error {
      background: var(--danger-bg);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .form-control {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-color);
      background: var(--bg-body);
      color: var(--text-primary);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      transition: var(--transition);
    }
    .form-control:focus { outline: none; border-color: var(--gold); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
    }
    .btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--primary-navy); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,168,67,0.3); }

    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== التطبيق ===== */
    .app-wrapper { display: flex; min-height: 100vh; }

    .sidebar {
      width: 270px;
      flex-shrink: 0;
      background: var(--bg-sidebar);
      color: var(--text-white);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      z-index: 100;
      transition: var(--transition);
      overflow-y: auto;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px 28px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 20px;
    }
    .sidebar-brand .logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: var(--primary-navy);
      flex-shrink: 0;
    }
    .sidebar-brand .brand-title { font-size: 16px; font-weight: 800; }
    .sidebar-brand .brand-subtitle { font-size: 11px; color: rgba(255,255,255,0.5); }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      transition: var(--transition);
      margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .nav-item.active {
      background: linear-gradient(90deg, rgba(212,168,67,0.15), rgba(212,168,67,0.05));
      color: var(--gold-light);
    }
    .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; opacity: 0.7; }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: var(--primary-navy);
      flex-shrink: 0;
    }
    .user-info .name { font-size: 14px; font-weight: 700; color: #fff; }
    .user-info .role { font-size: 11px; color: rgba(255,255,255,0.4); }

    .main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 50;
      min-height: 70px;
    }
    .topbar h1 { font-size: 18px; font-weight: 800; margin: 0; }
    .topbar-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--bg-body);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }
    .topbar-btn:hover { border-color: var(--gold); background: var(--gold); color: #fff; }

    .content { padding: 28px 32px; flex: 1; }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      transition: var(--transition);
    }
    .card + .card { margin-top: 20px; }
    .card-title { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
    }

    @media (max-width: 992px) {
      .sidebar {
        position: fixed;
        right: -300px;
        top: 0;
        bottom: 0;
        width: 280px;
        z-index: 101;
        transition: right 0.3s ease;
      }
      .sidebar.open { right: 0; }
      .menu-toggle { display: block; }
      .content { padding: 16px; }
      .topbar { padding: 12px 16px; }
      .topbar h1 { font-size: 15px; }
    }
  </style>
</head>
<body>

  <!-- ===== صفحة تسجيل الدخول ===== -->
  <div id="login-screen" class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo-circle">⭐</div>
        <h2>نظام تقييم جودة الأداء</h2>
        <p>مركز خدمة العملاء</p>
      </div>

      <div id="login-error" class="login-error"></div>

      <div class="form-group">
        <label class="form-label">👤 اسم المستخدم</label>
        <input type="text" id="login-username" class="form-control" placeholder="أدخل اسم المستخدم" value="admin">
      </div>

      <div class="form-group">
        <label class="form-label">🔒 كلمة السر</label>
        <input type="password" id="login-password" class="form-control" placeholder="أدخل كلمة السر" value="admin123">
      </div>

      <button class="btn btn-primary" onclick="handleLogin()">
        <span id="login-btn-text">🚀 تسجيل الدخول</span>
      </button>
    </div>
  </div>

  <!-- ===== التطبيق ===== -->
  <div id="app-shell" class="app-wrapper" style="display:none;">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo">⭐</div>
        <div>
          <div class="brand-title">تقييم الأداء</div>
          <div class="brand-subtitle">مركز خدمة العملاء</div>
        </div>
      </div>
      <nav id="nav-container"></nav>
      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="user-avatar" id="user-avatar">-</div>
          <div class="user-info">
            <div class="name" id="user-name">-</div>
            <div class="role" id="user-role">-</div>
          </div>
        </div>
        <div class="nav-item" onclick="handleLogout()" style="margin-top:8px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          تسجيل الخروج
        </div>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div style="display:flex; align-items:center; gap:16px;">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <h1 id="page-title">تقييم مكالمة جديدة</h1>
        </div>
        <button class="topbar-btn" onclick="toggleTheme()">🌓</button>
      </header>
      <div class="content">
        <div id="page-new-evaluation"></div>
        <div id="page-my-reports" style="display:none;"></div>
        <div id="page-comprehensive-reports" style="display:none;"></div>
        <div id="page-agents-management" style="display:none;"></div>
        <div id="page-assignments" style="display:none;"></div>
        <div id="page-criteria-management" style="display:none;"></div>
        <div id="page-users-management" style="display:none;"></div>
        <div id="page-audit-log" style="display:none;"></div>
      </div>
    </main>
  </div>

  <div id="toast-container" style="position:fixed; bottom:24px; left:24px; z-index:9999; display:flex; flex-direction:column; gap:10px;"></div>

  <!-- ===== JavaScript ===== -->
  <script>
    // ============================================================
    // رابط Google Apps Script - ✅ الصحيح
    // ============================================================
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyl9zjZNztraTVr9hqnSYGYXZks_2E347DzikKei8p2Zmf946J1poCnpNIANXxpdDKsbA/exec';

    // ============================================================
    // الحالة العامة
    // ============================================================
    var APP_STATE = {
      token: null,
      user: null,
      currentPage: null
    };

    // ============================================================
    // دوال API
    // ============================================================

    function api(functionName, ...args) {
      console.log('📡 Calling API:', functionName);
      
      return new Promise(function(resolve, reject) {
        try {
          if (typeof google !== 'undefined' && google.script) {
            google.script.run
              .withSuccessHandler(function(result) {
                console.log('✅ API Success:', result);
                resolve(result);
              })
              .withFailureHandler(function(error) {
                console.error('❌ API Error:', error);
                reject(error);
              })
              [functionName](...args);
          } else {
            // GitHub Pages - استخدام iframe بدلاً من fetch
            var iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            var messageId = Date.now() + '_' + Math.random();
            
            var timeout = setTimeout(function() {
              document.body.removeChild(iframe);
              reject(new Error('انتهت مهلة الاتصال بالخادم'));
            }, 30000);
            
            window.addEventListener('message', function handler(event) {
              if (event.data && event.data.messageId === messageId) {
                clearTimeout(timeout);
                window.removeEventListener('message', handler);
                document.body.removeChild(iframe);
                
                if (event.data.success) {
                  resolve(event.data.result);
                } else {
                  reject(new Error(event.data.error || 'خطأ في الخادم'));
                }
              }
            });
            
            iframe.src = SCRIPT_URL + '?action=' + functionName + '&args=' + encodeURIComponent(JSON.stringify(args));
          }
        } catch (e) {
          console.error('❌ API Exception:', e);
          reject(e);
        }
      });
    }

    function apiAuth(functionName, ...args) {
      if (!APP_STATE || !APP_STATE.token) {
        showToast('الرجاء تسجيل الدخول مرة أخرى', 'error');
        return Promise.reject(new Error('لا يوجد رمز جلسة'));
      }
      return api(functionName, APP_STATE.token, ...args);
    }

    // ============================================================
    // دوال مساعدة
    // ============================================================

    function showToast(message, type) {
      type = type || 'success';
      var container = document.getElementById('toast-container');
      if (!container) return;
      var toast = document.createElement('div');
      toast.style.cssText = 'background:#0f1a2e;color:#fff;padding:14px 22px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-size:13.5px;font-weight:600;border-right:4px solid ' + (type === 'success' ? '#2e7d5b' : '#c0392b') + ';margin-bottom:8px;';
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(function() { if (toast.parentNode) toast.remove(); }, 3500);
    }

    function roleLabel(role) {
      if (role === 'admin') return 'أدمن';
      if (role === 'supervisor') return 'مشرف';
      return 'مقيّم';
    }

    // ============================================================
    // تسجيل الدخول
    // ============================================================

    function handleLogin() {
      var username = document.getElementById('login-username');
      var password = document.getElementById('login-password');
      var errorBox = document.getElementById('login-error');
      var btnText = document.getElementById('login-btn-text');

      if (!username || !password) return;
      errorBox.style.display = 'none';
      var userVal = username.value.trim();
      var passVal = password.value;

      if (!userVal || !passVal) {
        errorBox.textContent = 'الرجاء إدخال اسم المستخدم وكلمة السر';
        errorBox.style.display = 'block';
        return;
      }

      btnText.innerHTML = '<span class="loader"></span>';

      api('login', userVal, passVal)
        .then(function(res) {
          btnText.textContent = '🚀 تسجيل الدخول';
          if (!res || !res.success) {
            errorBox.textContent = res ? res.message : 'خطأ في الاتصال';
            errorBox.style.display = 'block';
            return;
          }
          APP_STATE.token = res.token;
          APP_STATE.user = res.user;

          try {
            sessionStorage.setItem('appToken', res.token);
            sessionStorage.setItem('appUser', JSON.stringify(res.user));
          } catch (e) {}

          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app-shell').style.display = 'flex';
          enterApp();
        })
        .catch(function(err) {
          btnText.textContent = '🚀 تسجيل الدخول';
          errorBox.textContent = 'حدث خطأ: ' + (err.message || 'خطأ غير معروف');
          errorBox.style.display = 'block';
          console.error('Login error:', err);
        });
    }

    function handleLogout() {
      APP_STATE.token = null;
      APP_STATE.user = null;
      try { sessionStorage.removeItem('appToken'); sessionStorage.removeItem('appUser'); } catch(e) {}
      document.getElementById('app-shell').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('login-username').value = '';
      document.getElementById('login-password').value = '';
      showToast('تم تسجيل الخروج بنجاح', 'success');
    }

    // ============================================================
    // دخول التطبيق
    // ============================================================

    function enterApp() {
      var user = APP_STATE.user;
      document.getElementById('user-name').textContent = user.fullName;
      document.getElementById('user-role').textContent = roleLabel(user.role);
      document.getElementById('user-avatar').textContent = user.fullName.charAt(0);

      var container = document.getElementById('nav-container');
      var pages = [
        { id: 'new-evaluation', label: 'تقييم مكالمة جديدة', roles: ['evaluator', 'supervisor', 'admin'] },
        { id: 'my-reports', label: 'تقاريري', roles: ['evaluator', 'supervisor', 'admin'] },
        { id: 'comprehensive-reports', label: 'التقارير الشاملة', roles: ['supervisor', 'admin'] },
        { id: 'agents-management', label: 'إدارة الموظفين', roles: ['supervisor', 'admin'] },
        { id: 'assignments', label: 'توزيع الموظفين', roles: ['supervisor', 'admin'] },
        { id: 'criteria-management', label: 'إدارة المعايير', roles: ['admin'] },
        { id: 'users-management', label: 'إدارة المستخدمين', roles: ['admin'] },
        { id: 'audit-log', label: 'سجل التعديلات', roles: ['admin'] }
      ];

      container.innerHTML = '';
      pages.filter(function(p) { return p.roles.includes(user.role); }).forEach(function(p) {
        var div = document.createElement('div');
        div.className = 'nav-item';
        div.id = 'nav-' + p.id;
        div.textContent = p.label;
        div.onclick = function() { navigateTo(p.id); };
        container.appendChild(div);
      });

      navigateTo('new-evaluation');
    }

    function navigateTo(pageId) {
      var titles = {
        'new-evaluation': 'تقييم مكالمة جديدة',
        'my-reports': 'تقاريري',
        'comprehensive-reports': 'التقارير الشاملة',
        'agents-management': 'إدارة الموظفين',
        'assignments': 'توزيع الموظفين',
        'criteria-management': 'إدارة المعايير',
        'users-management': 'إدارة المستخدمين',
        'audit-log': 'سجل التعديلات'
      };
      document.getElementById('page-title').textContent = titles[pageId] || pageId;

      var pages = ['new-evaluation', 'my-reports', 'comprehensive-reports', 'agents-management', 'assignments', 'criteria-management', 'users-management', 'audit-log'];
      pages.forEach(function(id) {
        var el = document.getElementById('page-' + id);
        if (el) el.style.display = (id === pageId) ? 'block' : 'none';
        var nav = document.getElementById('nav-' + id);
        if (nav) nav.classList.toggle('active', id === pageId);
      });

      var container = document.getElementById('page-' + pageId);
      if (container) {
        container.innerHTML = '<div class="card"><span class="loader"></span> جارِ التحميل...</div>';
      }
    }

    // ============================================================
    // دوال الوضع الليلي والقائمة
    // ============================================================

    function toggleTheme() {
      var current = document.body.getAttribute('data-theme');
      document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // ============================================================
    // استعادة الجلسة
    // ============================================================

    function restoreSession() {
      try {
        var savedToken = sessionStorage.getItem('appToken');
        var savedUser = sessionStorage.getItem('appUser');
        if (savedToken && savedUser) {
          APP_STATE.token = savedToken;
          APP_STATE.user = JSON.parse(savedUser);
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app-shell').style.display = 'flex';
          enterApp();
        }
      } catch (e) {}
    }

    // ============================================================
    // عند تحميل الصفحة
    // ============================================================

    document.addEventListener('DOMContentLoaded', function() {
      restoreSession();
      
      document.getElementById('login-password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
      });
      document.getElementById('login-username').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
      });
    });
  </script>

</body>
</html>
