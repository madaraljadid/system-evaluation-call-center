<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');

  :root {
    --navy-950: #0f1729;
    --navy-900: #1a2744;
    --navy-800: #223257;
    --navy-700: #2c3f6b;
    --navy-500: #4a5f8a;
    --gold-500: #e8a020;
    --gold-400: #f0b344;
    --gold-600: #c8871a;
    --cream-50: #f7f8fb;
    --cream-100: #eef1f6;
    --white: #ffffff;
    --slate-500: #6b7280;
    --slate-400: #9aa4b2;
    --success: #2e7d5b;
    --success-bg: #e5f3ec;
    --danger: #c0392b;
    --danger-bg: #fbeae8;
    --warning: #d9822b;
    --warning-bg: #fbf0e2;

    --bg-page: var(--cream-50);
    --bg-surface: var(--white);
    --bg-surface-alt: var(--cream-100);
    --bg-sidebar: var(--navy-900);
    --text-primary: var(--navy-900);
    --text-secondary: var(--slate-500);
    --text-on-dark: #eef1f6;
    --border-color: #e2e6ee;
    --shadow-soft: 0 2px 10px rgba(26, 39, 68, 0.06);
    --shadow-card: 0 4px 18px rgba(26, 39, 68, 0.08);
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-sm: 8px;
  }

  [data-theme="dark"] {
    --bg-page: var(--navy-950);
    --bg-surface: #16233d;
    --bg-surface-alt: #1c2c4a;
    --bg-sidebar: #0f1729;
    --text-primary: #eef1f6;
    --text-secondary: #9aa4b2;
    --border-color: #263a5e;
    --shadow-soft: 0 2px 10px rgba(0, 0, 0, 0.25);
    --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.35);
    --success-bg: rgba(46, 125, 91, 0.18);
    --danger-bg: rgba(192, 57, 43, 0.18);
    --warning-bg: rgba(217, 130, 43, 0.18);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Tajawal', sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    transition: background 0.25s ease, color 0.25s ease;
  }

  body { direction: rtl; text-align: right; }

  ::selection { background: var(--gold-500); color: var(--navy-900); }

  a { color: inherit; text-decoration: none; }

  /* ===== Layout ===== */
  .app-shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--bg-sidebar);
    color: var(--text-on-dark);
    display: flex; flex-direction: column;
    padding: 22px 16px;
    position: sticky; top: 0; height: 100vh;
  }

  .sidebar-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px 26px 10px;
  }
  .sidebar-brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gold-500); }
  .sidebar-brand .title { font-weight: 800; font-size: 17px; letter-spacing: 0.2px; }
  .sidebar-brand .subtitle { font-size: 11px; color: #93a2c2; }

  .nav-group { margin-bottom: 6px; }
  .nav-label { font-size: 11px; color: #6f80a8; padding: 10px 12px 4px; font-weight: 700; letter-spacing: 0.4px; }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 12px; border-radius: var(--radius-sm);
    cursor: pointer; font-size: 14.5px; font-weight: 500;
    color: #c7d1e6; margin-bottom: 2px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.85; }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nav-item.active { background: linear-gradient(90deg, rgba(232,160,32,0.18), rgba(232,160,32,0.05)); color: var(--gold-400); font-weight: 700; }
  .nav-item.active svg { opacity: 1; }

  .sidebar-footer { margin-top: auto; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.08); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gold-500); color: var(--navy-900);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; flex-shrink: 0;
  }
  .sidebar-user .name { font-size: 13.5px; font-weight: 700; color: #fff; }
  .sidebar-user .role { font-size: 11px; color: #93a2c2; }

  .main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px; background: var(--bg-surface);
    border-bottom: 1px solid var(--border-color);
    position: sticky; top: 0; z-index: 5;
  }
  .topbar h1 { font-size: 19px; margin: 0; font-weight: 800; }
  .topbar .topbar-right { display: flex; align-items: center; gap: 14px; }

  .icon-btn {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-surface-alt); border: 1px solid var(--border-color);
    cursor: pointer; transition: all 0.15s ease;
  }
  .icon-btn:hover { border-color: var(--gold-500); }
  .icon-btn svg { width: 18px; height: 18px; }

  .content-area { padding: 26px 28px; flex: 1; }

  /* ===== Cards ===== */
  .card {
    background: var(--bg-surface); border-radius: var(--radius-lg);
    padding: 22px; box-shadow: var(--shadow-soft);
    border: 1px solid var(--border-color);
  }
  .card + .card { margin-top: 18px; }
  .card-title { font-size: 15.5px; font-weight: 800; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; }
  .stat-card {
    background: var(--bg-surface); border: 1px solid var(--border-color);
    border-radius: var(--radius-md); padding: 18px; box-shadow: var(--shadow-soft);
  }
  .stat-card .stat-label { font-size: 12.5px; color: var(--text-secondary); font-weight: 500; margin-bottom: 8px; }
  .stat-card .stat-value { font-size: 26px; font-weight: 800; color: var(--navy-900); }
  [data-theme="dark"] .stat-card .stat-value { color: #fff; }
  .stat-card .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  /* ===== Buttons ===== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 18px; border-radius: var(--radius-sm); border: none;
    font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s ease;
  }
  .btn-primary { background: var(--gold-500); color: var(--navy-900); }
  .btn-primary:hover { background: var(--gold-400); }
  .btn-outline { background: transparent; border: 1.5px solid var(--border-color); color: var(--text-primary); }
  .btn-outline:hover { border-color: var(--gold-500); }
  .btn-danger { background: var(--danger-bg); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 12.5px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-block { width: 100%; }

  /* ===== Forms ===== */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 7px; color: var(--text-primary); }
  .form-control {
    width: 100%; padding: 11px 14px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border-color); background: var(--bg-surface);
    color: var(--text-primary); font-family: 'Tajawal', sans-serif; font-size: 14px;
    transition: border-color 0.15s ease;
  }
  .form-control:focus { outline: none; border-color: var(--gold-500); }
  textarea.form-control { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .score-slider-row { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .score-slider-row .slider-label { flex: 1; font-size: 14px; font-weight: 600; }
  .score-slider-row .slider-weight { font-size: 11.5px; color: var(--text-secondary); }
  .score-slider-row input[type="range"] { flex: 2; accent-color: var(--gold-500); }
  .score-slider-row .slider-value {
    width: 42px; text-align: center; font-weight: 800; font-size: 15px;
    background: var(--bg-surface-alt); border-radius: 8px; padding: 4px 0;
  }

  /* ===== Table ===== */
  .table-wrap { overflow-x: auto; }
  table.data-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  table.data-table th {
    text-align: right; padding: 12px 14px; background: var(--bg-surface-alt);
    font-weight: 700; color: var(--text-secondary); font-size: 12.5px;
    position: sticky; top: 0;
  }
  table.data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border-color); }
  table.data-table tr:hover td { background: var(--bg-surface-alt); }

  .badge {
    display: inline-flex; padding: 4px 10px; border-radius: 20px;
    font-size: 11.5px; font-weight: 700;
  }
  .badge-success { background: var(--success-bg); color: var(--success); }
  .badge-danger { background: var(--danger-bg); color: var(--danger); }
  .badge-warning { background: var(--warning-bg); color: var(--warning); }
  .badge-navy { background: var(--bg-surface-alt); color: var(--text-primary); }

  /* ===== Score Dial (signature element) ===== */
  .score-dial { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .score-dial svg { transform: rotate(-90deg); }
  .score-dial .dial-value {
    position: absolute; font-weight: 800; font-family: 'Tajawal', sans-serif;
  }
  .score-dial .dial-arc-bg { stroke: var(--bg-surface-alt); }

  /* ===== Matrix ===== */
  .matrix-wrap { overflow: auto; max-height: 65vh; border: 1px solid var(--border-color); border-radius: var(--radius-md); }
  table.matrix-table { border-collapse: collapse; font-size: 13px; min-width: 100%; }
  table.matrix-table th, table.matrix-table td { border: 1px solid var(--border-color); padding: 8px 10px; text-align: center; }
  table.matrix-table th.agent-col-header, table.matrix-table td.agent-col {
    position: sticky; right: 0; background: var(--bg-surface); text-align: right;
    font-weight: 600; z-index: 2; min-width: 160px;
  }
  table.matrix-table th { background: var(--bg-surface-alt); position: sticky; top: 0; z-index: 3; font-weight: 700; }
  table.matrix-table th.agent-col-header { z-index: 4; }
  table.matrix-table input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--gold-500); cursor: pointer; }

  /* ===== Toast ===== */
  #toast-container { position: fixed; bottom: 24px; left: 24px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: var(--navy-900); color: #fff; padding: 13px 20px; border-radius: var(--radius-sm);
    box-shadow: var(--shadow-card); font-size: 13.5px; font-weight: 600;
    display: flex; align-items: center; gap: 10px; min-width: 240px;
    animation: toast-in 0.25s ease;
  }
  .toast.success { border-right: 4px solid var(--success); }
  .toast.error { border-right: 4px solid var(--danger); }
  @keyframes toast-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== Login page ===== */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, var(--navy-950) 0%, var(--navy-900) 55%, var(--navy-800) 100%);
    padding: 20px;
  }
  .login-card {
    background: var(--bg-surface); border-radius: 22px; padding: 42px 38px;
    width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  .login-brand { text-align: center; margin-bottom: 30px; }
  .login-brand .dot-ring {
    width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 14px;
    background: var(--navy-900); display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 5px rgba(232,160,32,0.15);
  }
  .login-brand .dot-ring .dot { width: 16px; height: 16px; border-radius: 50%; background: var(--gold-500); }
  .login-brand h2 { margin: 0; font-size: 18px; font-weight: 800; }
  .login-brand p { margin: 4px 0 0; font-size: 12.5px; color: var(--text-secondary); }
  .login-error { background: var(--danger-bg); color: var(--danger); padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
  .empty-state svg { width: 48px; height: 48px; opacity: 0.35; margin-bottom: 12px; }

  .loader { display: inline-block; width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: currentColor; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .search-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .search-bar .form-control { flex: 1; }

  .tabs-inline { display: flex; gap: 6px; margin-bottom: 18px; border-bottom: 1px solid var(--border-color); }
  .tab-btn { padding: 10px 16px; font-size: 13.5px; font-weight: 700; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--gold-600); border-bottom-color: var(--gold-500); }
  [data-theme="dark"] .tab-btn.active { color: var(--gold-400); }

  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(15, 23, 41, 0.55);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    padding: 20px;
  }
  .modal-box {
    background: var(--bg-surface); border-radius: var(--radius-lg);
    padding: 24px; width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto;
    box-shadow: var(--shadow-card);
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .modal-header h3 { margin: 0; font-size: 16.5px; font-weight: 800; }
  .modal-close { cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .modal-close:hover { background: var(--bg-surface-alt); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-start; margin-top: 20px; }

  /* ===== Simple bar chart (30-day activity) ===== */
  .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 90px; }
  .bar-chart .bar { flex: 1; background: var(--gold-500); border-radius: 3px 3px 0 0; min-height: 2px; position: relative; }
  .bar-chart .bar:hover { background: var(--gold-400); }

  @media (max-width: 900px) {
    .sidebar { position: fixed; right: -260px; z-index: 50; transition: right 0.2s ease; }
    .sidebar.open { right: 0; }
    .form-row { grid-template-columns: 1fr; }
    .content-area { padding: 18px 14px; }
  }
</style>
